services:

  db:
    image: postgres:16-alpine
    container_name: flourish-db
    environment:
      POSTGRES_DB: flourish
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - flourish-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flourish-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Database=flourish;Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}"
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      Google__ServiceAccountJson: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      PublicUrl: ${PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  flourish-pgdata:
